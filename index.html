<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Урока 2: Профайлинг безопасности</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --error-color: #dc2626;
            --bg-slate: #f8fafc;
            --chat-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
            --worker-msg: #f1f5f9;
            --user-msg: #dbeafe;
            --user-text: #1e40af;
        }

        .sim-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 100%;
            max-width: 850px;
            height: 600px; /* СТРОГОЕ ОГРАНИЧЕНИЕ ВЫСОТЫ */
            margin: 10px auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-slate);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Шапка */
        .sim-header {
            padding: 12px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sim-title {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        .sim-status {
            font-size: 12px;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* Окно диалога */
        .sim-chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f8fafc;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
            animation: simFadeIn 0.25s ease-in-out;
        }

        .msg-worker {
